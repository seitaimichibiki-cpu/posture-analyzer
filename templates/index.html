<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>整体院 導 ｜ AI 姿勢解析システム</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">整体院 導</div>
            <h1>AI 姿勢解析システム</h1>
            <p class="subtitle">MediaPipe 高精度姿勢推定エンジン</p>
        </header>

        <main>
            <section class="upload-section">
                <div class="view-selector">
                    <button id="btnFront" class="view-btn active" onclick="setView('front')">正面解析</button>
                    <button id="btnSide" class="view-btn" onclick="setView('side')">側面解析</button>
                </div>

                <div class="card photo-card">
                    <div id="previewArea" class="preview-area">
                        <div class="default-msg">
                            <span class="icon">📸</span>
                            <p>解析する写真を撮影または選択してください</p>
                        </div>
                        <img id="imagePreview" src="" alt="Preview" style="display: none;">
                    </div>
                    
                    <div class="actions">
                        <!-- ボタンごとに異なる入力を使い分ける -->
                        <input type="file" id="fileInputCamera" accept="image/*" capture="camera" style="display: none;">
                        <input type="file" id="fileInputLibrary" accept="image/*" style="display: none;">
                        
                        <div class="input-group">
                            <button class="primary-btn flex-1" onclick="document.getElementById('fileInputCamera').click()">📸 写真を撮る</button>
                            <button class="primary-btn flex-1" onclick="document.getElementById('fileInputLibrary').click()">📁 フォルダから選択</button>
                        </div>
                        <button id="btnAnalyze" class="analyze-btn" disabled onclick="startAnalysis()">🚀 解析を実行</button>
                    </div>
                </div>
            </section>

            <!-- Loading Overlay -->
            <div id="loadingOverlay" class="overlay" style="display: none;">
                <div class="loader-content">
                    <div class="spinner"></div>
                    <p>AI解析中...<br><span>（約5〜10秒ほどかかります）</span></p>
                </div>
            </div>

            <!-- Result Section -->
            <section id="resultSection" class="result-section" style="display: none;">
                <div class="card result-card">
                    <h2>解析レポート</h2>
                    <div class="report-wrapper">
                                <img id="resultImage" src="" alt="Analysis Report">
                            </div>
                            <p class="guide-text">※画像を長押しして保存することもできます</p>
                            <div class="result-actions">
                                <a id="downloadBtn" href="" download="姿勢解析レポート.jpg" class="secondary-btn">💾 画像を保存</a>
                        <button class="text-btn" onclick="reset()">✨ 別の解析をする</button>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script>
        let currentView = 'front';
        let selectedFile = null;

        function setView(view) {
            currentView = view;
            document.getElementById('btnFront').classList.toggle('active', view === 'front');
            document.getElementById('btnSide').classList.toggle('active', view === 'side');
        }

        // 両方の入力イベントに共通の処理を紐付け
        const handleFileSelect = (e) => {
            const file = e.target.files[0];
            if (file) {
                selectedFile = file;
                const reader = new FileReader();
                reader.onload = (re) => {
                    document.getElementById('imagePreview').src = re.target.result;
                    document.getElementById('imagePreview').style.display = 'block';
                    document.querySelector('.default-msg').style.display = 'none';
                    document.getElementById('btnAnalyze').disabled = false;
                };
                reader.readAsDataURL(file);
            }
        };

        document.getElementById('fileInputCamera').onchange = handleFileSelect;
        document.getElementById('fileInputLibrary').onchange = handleFileSelect;

        async function startAnalysis() {
            if (!selectedFile) return;

            document.getElementById('loadingOverlay').style.display = 'flex';
            document.getElementById('resultSection').style.display = 'none';

            try {
                // --- クライアント側でリサイズ処理 (メモリ節約のため) ---
                const resizedBlob = await resizeImage(selectedFile, 800);
                
                const formData = new FormData();
                formData.append('image', resizedBlob, 'upload.jpg');
                formData.append('view_type', currentView);

                // クラウド環境（Render）の無料プランは最初の起動に時間がかかるため
                // 明示的に "/analyze" への相対パスでリクエストを送る
                const response = await fetch('./analyze', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();

                if (data.success) {
                    const filename = data.report_url.split('/').pop();
                    const reportUrl = data.report_url + '?t=' + Date.now();
                    document.getElementById('resultImage').src = reportUrl;
                    
                    const downloadBtn = document.getElementById('downloadBtn');
                    // フルURLを生成して確実にダウンロードルートへ飛ばす
                    const downloadUrl = window.location.origin + '/download/' + filename;
                    downloadBtn.href = downloadUrl;
                    
                    document.getElementById('resultSection').style.display = 'block';
                    document.getElementById('resultSection').scrollIntoView({ behavior: 'smooth' });
                } else {
                    alert('エラー: ' + data.error);
                }
            } catch (err) {
                alert('通信エラーが発生しました。接続を確認するか、しばらく待ってから再度お試しください。');
                console.error(err);
            } finally {
                document.getElementById('loadingOverlay').style.display = 'none';
            }
        }

        // 画像をリサイズするユーティリティ関数
        function resizeImage(file, maxSide) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        let w = img.width;
                        let h = img.height;
                        if (w > h && w > maxSide) {
                            h = (h * maxSide) / w;
                            w = maxSide;
                        } else if (h > maxSide) {
                            w = (w * maxSide) / h;
                            h = maxSide;
                        }
                        const canvas = document.createElement('canvas');
                        canvas.width = w;
                        canvas.height = h;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, w, h);
                        canvas.toBlob((blob) => resolve(blob), 'image/jpeg', 0.8);
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        function reset() {
            selectedFile = null;
            document.getElementById('fileInputCamera').value = '';
            document.getElementById('fileInputLibrary').value = '';
            document.getElementById('imagePreview').style.display = 'none';
            document.querySelector('.default-msg').style.display = 'flex';
            document.getElementById('btnAnalyze').disabled = true;
            document.getElementById('resultSection').style.display = 'none';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
</html>
