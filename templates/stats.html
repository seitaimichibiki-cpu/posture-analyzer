<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>進捗統計 ｜ 整体院 導</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .stats-container {
            max-width: 800px;
            margin: 0 auto;
        }
        .chart-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 24px;
            border: 1px solid var(--border);
        }
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }
        .search-box input {
            flex: 1;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: white;
            font-size: 16px;
        }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .tab-btn {
            padding: 8px 16px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-muted);
            border: 1px solid var(--border);
            cursor: pointer;
            font-size: 14px;
        }
        .tab-btn.active {
            background: var(--accent-gradient);
            color: #080a12;
            border: none;
        }
        .no-data {
            text-align: center;
            padding: 50px;
            color: var(--text-muted);
            background: rgba(0,0,0,0.2);
            border-radius: 20px;
        }
    </style>
</head>
<body>
    <div class="container stats-container">
        <header>
            <div class="logo">整体院 導</div>
            <h1>改善進捗グラフ</h1>
            <p class="subtitle">数値データの推移を確認</p>
            <div style="margin-top: 15px;">
                <a href="{{ url_for('index') }}" style="color: var(--text-muted); text-decoration: none; font-size: 14px;">← 解析画面に戻る</a>
            </div>
        </header>

        <main>
            <div class="search-box">
                <input type="text" id="patientIdInput" placeholder="顧客IDを入力（例: 101）" value="{{ patient_id }}">
                <button onclick="loadStats()" class="primary-btn" style="padding: 10px 24px;">検索</button>
            </div>

            <div id="statsContent" style="display: none;">
                <div class="tabs">
                    <button class="tab-btn active" onclick="switchTheme('front')">正面解析の推移</button>
                    <button class="tab-btn" onclick="switchTheme('side')">側面解析の推移</button>
                </div>

                <div id="frontCharts">
                    <div class="chart-card">
                        <h3 style="margin-bottom: 15px; font-size: 16px;">肩・骨盤の傾き角度 (°)</h3>
                        <canvas id="angleChart"></canvas>
                        <p style="font-size: 11px; color: var(--text-muted); margin-top: 10px;">※ 0に近づくほど平行で良好な状態です。</p>
                    </div>
                </div>

                <div id="sideCharts" style="display: none;">
                    <div class="chart-card">
                        <h3 style="margin-bottom: 15px; font-size: 16px;">首のズレ・ラウンド肩 (%)</h3>
                        <canvas id="shiftChart"></canvas>
                        <p style="font-size: 11px; color: var(--text-muted); margin-top: 10px;">※ 数値が低いほど垂直に近い良好な状態です。</p>
                    </div>
                </div>
            </div>

            <div id="noDataArea" class="no-data">
                <span style="font-size: 40px; display: block; margin-bottom: 10px;">📊</span>
                顧客IDを入力して検索してください。
            </div>
        </main>
    </div>

    <script>
        let angleChart, shiftChart;
        let allData = [];

        async function loadStats() {
            const pid = document.getElementById('patientIdInput').value;
            if (!pid) return;

            try {
                const res = await fetch(`/api/patient_stats?patient_id=${encodeURIComponent(pid)}`);
                const result = await res.json();
                
                if (result.success && result.data.length > 0) {
                    allData = result.data;
                    document.getElementById('statsContent').style.display = 'block';
                    document.getElementById('noDataArea').style.display = 'none';
                    renderCharts();
                } else {
                    document.getElementById('statsContent').style.display = 'none';
                    document.getElementById('noDataArea').style.display = 'block';
                    document.getElementById('noDataArea').textContent = 'データが見つかりませんでした。';
                }
            } catch (e) {
                console.error(e);
            }
        }

        function switchTheme(mode) {
            const btns = document.querySelectorAll('.tab-btn');
            btns.forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');

            document.getElementById('frontCharts').style.display = mode === 'front' ? 'block' : 'none';
            document.getElementById('sideCharts').style.display = mode === 'side' ? 'block' : 'none';
        }

        function renderCharts() {
            const frontData = allData.filter(d => d.view === 'front' || d.view.includes('front'));
            const sideData = allData.filter(d => d.view === 'side' || d.view.includes('side'));

            // Destroy previous charts
            if (angleChart) angleChart.destroy();
            if (shiftChart) shiftChart.destroy();

            const chartConfig = (labels, datasets) => ({
                type: 'line',
                data: { labels, datasets },
                options: {
                    responsive: true,
                    interaction: { mode: 'index', intersect: false },
                    plugins: { legend: { labels: { color: '#94a3b8' } } },
                    scales: {
                        x: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#94a3b8' } },
                        y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#94a3b8' } }
                    }
                }
            });

            // Angle Chart (Front)
            angleChart = new Chart(document.getElementById('angleChart'), chartConfig(
                frontData.map(d => d.date),
                [
                    { label: '肩の傾き', data: frontData.map(d => Math.abs(d.shoulder_angle)), borderColor: '#4facfe', tension: 0.3, fill: false },
                    { label: '骨盤の傾き', data: frontData.map(d => Math.abs(d.pelvis_angle)), borderColor: '#00e676', tension: 0.3, fill: false }
                ]
            ));

            // Shift Chart (Side)
            shiftChart = new Chart(document.getElementById('shiftChart'), chartConfig(
                sideData.map(d => d.date),
                [
                    { label: '首のズレ (FHP)', data: sideData.map(d => d.fhp), borderColor: '#fbc2eb', tension: 0.3, fill: false },
                    { label: 'ラウンド肩', data: sideData.map(d => d.rs), borderColor: '#a18cd1', tension: 0.3, fill: false }
                ]
            ));
        }

        // ページ読み込み時にIDがあれば自動検索
        window.onload = () => {
            if (document.getElementById('patientIdInput').value) {
                loadStats();
            }
        };
    </script>
</body>
</html>
