<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ログイン | 整体院 導 AI姿勢解析</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <!-- PWA -->
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#080a12">
    <link rel="apple-touch-icon" href="/static/icon-512.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        /* These styles are now part of style.css or specific to this page */
        .login-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .login-box {
            width: 100%;
            max-width: 400px;
        }
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: var(--text-muted);
        }
        .form-control {
            width: 100%;
            padding: 12px 16px;
            border-radius: 8px;
            background: #0a0e1a;
            border: 1px solid var(--border);
            color: white;
            font-size: 16px;
            transition: 0.3s;
        }
        .form-control:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(74, 144, 226, 0.2);
        }
        .error-msg {
            background: rgba(255, 71, 87, 0.1);
            color: #ff4757;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 20px;
            display: none;
            text-align: center;
        }
        .alert-success {
            background: rgba(0, 230, 118, 0.1);
            color: var(--success);
            border: 1px solid rgba(0, 230, 118, 0.2);
            padding: 12px;
            border-radius: 12px;
            font-size: 13px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: 600;
        }
        .login-footer-links {
            margin-top: 25px;
            text-align: center;
            font-size: 11px;
            color: var(--text-muted);
            line-height: 1.5;
        }
        .login-footer-copyright {
            margin-top: 30px;
            text-align: center;
            font-size: 12px;
            color: var(--text-muted);
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box card">
            <div class="login-header">
                <div class="logo">整体院 導</div>
                <h1>AI 姿勢解析</h1>
                <p class="subtitle">PREMIUM EDITION</p>
            </div>

            <div id="errorMsg" class="error-msg"></div>

            {% with messages = get_flashed_messages(with_categories=true) %}
              {% if messages %}
                {% for category, message in messages %}
                  <div class="alert" style="background: rgba(0, 230, 118, 0.1); color: var(--success); border: 1px solid rgba(0, 230, 118, 0.2); padding: 12px; border-radius: 12px; font-size: 13px; margin-bottom: 20px; text-align: center; font-weight: 600;">
                    {{ message }}
                  </div>
                {% endfor %}
              {% endif %}
            {% endwith %}

            <form id="loginForm">
                <div class="form-group">
                    <label for="email">メールアドレス</label>
                    <input type="email" id="email" class="form-control" placeholder="example@michibiki.com" required>
                </div>
                <div class="form-group">
                    <label for="password">パスワード</label>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                </div>
                <div class="form-group" style="display: flex; align-items: center; gap: 8px;">
                    <input type="checkbox" id="remember" style="width: 16px; height: 16px; accent-color: var(--accent); cursor: pointer;">
                    <label for="remember" style="margin-bottom: 0; cursor: pointer; user-select: none;">ログイン状態を保存する</label>
                </div>
                <button type="submit" id="submitBtn" class="analyze-btn" style="width: 100%; margin-top: 10px;">
                    システムにログイン
                </button>
                <div style="margin-top: 15px; text-align: center;">
                    <a href="{{ url_for('forgot_password') }}" style="color: var(--accent); text-decoration: none; font-size: 14px;">パスワードを忘れた場合</a>
                </div>
            </form>

            <form id="otpForm" style="display: none;">
                <p style="font-size: 13px; color: var(--text-muted); text-align: center; margin-bottom: 20px;">
                    ご登録のメールアドレスに認証コードを送信しました。
                </p>
                <div class="form-group">
                    <label for="otpCode">認証コード (6桁)</label>
                    <input type="text" id="otpCode" class="form-control" placeholder="000000" maxlength="6" required style="text-align: center; letter-spacing: 5px; font-size: 24px;">
                </div>
                <button type="submit" id="otpSubmitBtn" class="analyze-btn" style="width: 100%; margin-top: 10px;">
                    認証してログイン
                </button>
                <div style="margin-top: 15px; text-align: center;">
                    <a href="javascript:location.reload()" style="color: var(--text-muted); text-decoration: none; font-size: 13px;">← ログイン画面に戻る</a>
                </div>
            </form>

            <div style="margin-top: 30px; text-align: center; font-size: 12px; color: var(--text-muted);">
                &copy; 2026 整体院 導. All rights Reserved.
            </div>
        </div>
    </div>

    <script>
        let pendingUserId = null;

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const error = document.getElementById('errorMsg');
            
            btn.disabled = true;
            btn.textContent = '処理中...';
            error.style.display = 'none';

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            const remember = document.getElementById('remember').checked;

            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: `email=${encodeURIComponent(email)}&password=${encodeURIComponent(password)}&remember=${remember}`
                });

                const data = await response.json();

                if (data.success) {
                    if (data.requires_2fa) {
                        pendingUserId = data.user_id;
                        document.getElementById('loginForm').style.display = 'none';
                        document.getElementById('otpForm').style.display = 'block';
                    } else {
                        window.location.href = '/';
                    }
                } else {
                    error.textContent = data.error;
                    error.style.display = 'block';
                    btn.disabled = false;
                    btn.textContent = 'システムにログイン';
                }
            } catch (err) {
                error.textContent = '通信エラーが発生しました。';
                error.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'システムにログイン';
            }
        });

        document.getElementById('otpForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('otpSubmitBtn');
            const error = document.getElementById('errorMsg');
            const code = document.getElementById('otpCode').value.trim();
            
            btn.disabled = true;
            btn.textContent = '認証中...';
            error.style.display = 'none';

            try {
                const response = await fetch('/verify_otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: pendingUserId, code: code })
                });

                const data = await response.json();

                if (data.success) {
                    window.location.href = '/';
                } else {
                    error.textContent = data.error;
                    error.style.display = 'block';
                    btn.disabled = false;
                    btn.textContent = '認証してログイン';
                }
            } catch (err) {
                error.textContent = '認証に失敗しました。';
                error.style.display = 'block';
                btn.disabled = false;
                btn.textContent = '認証してログイン';
            }
        });

        // PWA Service Worker Registration
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/static/sw.js')
                    .then(reg => console.log('SW registered'))
                    .catch(err => console.log('SW failed', err));
            });
        }
    </script>
</body>
</html>
