<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お支払いが必要です | 整体院 導</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        .payment-card {
            max-width: 500px;
            margin: 60px auto;
            text-align: center;
            padding: 40px;
        }
        .payment-icon {
            font-size: 64px;
            margin-bottom: 24px;
        }
        .airpay-link {
            display: inline-block;
            background: #0066cc;
            color: white;
            padding: 16px 32px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 700;
            font-size: 1.1em;
            margin: 24px 0;
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(0, 102, 204, 0.3);
        }
        .airpay-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 102, 204, 0.4);
            filter: brightness(1.1);
        }
        .notice-box {
            background: rgba(0, 0, 0, 0.03);
            border-radius: 12px;
            padding: 20px;
            margin-top: 30px;
            font-size: 14px;
            line-height: 1.6;
            text-align: left;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card payment-card">
            <div class="payment-icon">💳</div>
            <h1>ご利用にはお支払いが必要です</h1>
            <p style="color: var(--text-muted); margin-top: 10px;">
                継続課金のお手続きが完了すると、AI姿勢解析ツールの全機能がご利用いただけます。
            </p>

            <a href="https://airpayment.jp/" target="_blank" class="airpay-link">
                AirPAYで決済手続きを行う
            </a>

            <div class="notice-box">
                <p><strong>【お手続き後の流れ】</strong></p>
                <ol style="margin-top: 10px; padding-left: 20px;">
                    <li>上記のボタンからAirPAYの決済画面へ進み、お手続きを完了させてください。</li>
                    <li>決済完了後、当院スタッフが確認を行い、順次アカウントを有効化いたします。</li>
                    <li>有効化が完了すると、自動的に解析画面がご利用いただけるようになります。</li>
                </ol>
                <p style="margin-top: 15px; font-size: 12px; color: var(--text-muted);">
                    ※反映までにお時間をいただく場合がございます。お急ぎの場合は担当スタッフまでご連絡ください。
                </p>
            </div>

            <div style="margin-top: 30px;">
                <a href="{{ url_for('logout') }}" style="color: var(--text-muted); font-size: 14px;">ログアウト</a>
            </div>
        </div>
    </div>
</body>
</html>
