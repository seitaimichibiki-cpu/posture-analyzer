<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新しいパスワードの設定 | 整体院 導 AI姿勢解析</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        .login-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .login-box {
            width: 100%;
            max-width: 400px;
        }
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: var(--text-muted);
        }
        .form-control {
            width: 100%;
            padding: 12px 16px;
            border-radius: 8px;
            background: #0a0e1a;
            border: 1px solid var(--border);
            color: white;
            font-size: 16px;
            transition: 0.3s;
        }
        .form-control:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(74, 144, 226, 0.2);
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box card">
            <div class="login-header">
                <div class="logo">整体院 導</div>
                <h1>新しいパスワードの設定</h1>
                <p class="subtitle">覚えやすいパスワードを入力してください</p>
            </div>

            <form action="{{ url_for('reset_password', token=token) }}" method="POST">
                <div class="form-group">
                    <label for="password">新しいパスワード</label>
                    <input type="password" name="password" id="password" class="form-control" placeholder="••••••••" required minlength="8">
                </div>
                <button type="submit" class="analyze-btn primary-btn" style="width: 100%; margin-top: 10px;">
                    パスワードを更新
                </button>
            </form>

            <div style="margin-top: 30px; text-align: center; font-size: 12px; color: var(--text-muted);">
                &copy; 2024 整体院 導. All rights Reserved.
            </div>
        </div>
    </div>
</body>
</html>
