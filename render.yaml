services:
  - type: web
    name: posture-analyzer
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python migrate_advice.py && gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --worker-class gthread --threads 1 --timeout 300
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: posture-db
          property: connectionString

databases:
  - name: posture-db
    databaseName: posture_analyzer
    user: admin
    plan: free # 無料プラン
